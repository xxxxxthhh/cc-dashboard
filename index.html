<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Gang Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
        .card { background: #161616; border: 1px solid #333; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin: 0 0 12px 0; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        .data-row:last-child { border-bottom: none; }
        .key { color: #aaa; }
        .val { color: #fff; font-weight: 600; }
        .val.profit { color: #4caf50; }
        .val.loss { color: #f44336; }
        .unlock { display: flex; gap: 10px; margin-top: 20px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; flex: 1; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #444; }
        #dashboard { display: none; }
    </style>
</head>
