<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Gang Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #161616; border: 1px solid #333; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
        h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .pos-card { border-left: 4px solid #444; margin-bottom: 10px; padding: 10px; background: #1c1c1c; border-radius: 0 8px 8px 0; }
        .pos-card.CC { border-left-color: #39d2c0; }
        .pos-card.CSP { border-left-color: #bc8cff; }
        .head { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .detail { font-size: 13px; color: #aaa; display: flex; justify-content: space-between; }
        .progress-bg { height: 6px; background: #333; border-radius: 3px; margin: 8px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .unlock { display: flex; gap: 10px; margin-top: 20px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; flex: 1; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        #dashboard { display: none; }
    </style>
</head>

                const key = await crypto.subtle.deriveKey({name: 'PBKDF2', salt: b64(ENC.salt), iterations: 100000, hash: 'SHA-256'}, km, {name: 'AES-GCM', length: 256}, false, ['decrypt']);
                const ct = b64(ENC.data), tag = b64(ENC.tag);
                const combined = new Uint8Array(ct.length + tag.length);
                combined.set(ct); combined.set(tag, ct.length);
                const data = JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name: 'AES-GCM', iv: b64(ENC.iv)}, key, combined)));
                document.getElementById('lock').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                const ong = document.getElementById('ongoing');
                [...data.ccPositions, ...data.cspPositions].forEach(p => {
                    const profit = p.profit || 0;
                    const color = profit >= 80 ? '#4caf50' : (profit < 0 ? '#f44336' : '#58a6ff');
                    const width = Math.min(Math.max(profit, 0), 100);
                    ong.innerHTML += `
                        <div class="pos-card ${p.type}">
                            <div class="head"><span>${p.ticker} ${p.type} $${p.strike}</span><span>$${p.premium}</span></div>
                            <div class="progress-bg"><div class="progress-fill" style="width:${width}%; background:${color};"></div></div>
                            <div class="detail"><span>${p.expiry}</span><span>${profit}%</span></div>
                        </div>`;
                });
                data.closedTrades.forEach(t => {
                    document.getElementById('realized').innerHTML += `<div class="data-row"><span class="key">${t.ticker}</span><span class="val">$${t.premium}</span></div>`;
                });
            } catch(e) { document.getElementById('err').textContent = '密码错误'; }
        }
    </script>
</body>
</html>
