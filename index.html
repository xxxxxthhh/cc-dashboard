<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Gang Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e14; color: #c9d1d9; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 24px; background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Lock screen */
        #lock { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        #lock input { background: #12171f; border: 2px solid #1e2733; border-radius: 8px; color: white; font-size: 18px; padding: 12px 20px; width: 200px; text-align: center; outline: none; }
        #lock input:focus { border-color: #58a6ff; }
        #lock button { background: #58a6ff; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin-top: 12px; font-size: 14px; }
        #lock .error { color: #f85149; font-size: 13px; margin-top: 8px; }
        
        /* Dashboard */
        #dashboard { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Stats grid */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: #12171f; border: 1px solid #1e2733; border-radius: 12px; padding: 16px; }
        .stat-card .label { color: #6e7681; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-card .value { font-size: 24px; font-weight: 700; }
        .stat-card .sub { font-size: 12px; color: #6e7681; margin-top: 4px; }
        .green { color: #3fb950; }
        .red { color: #f85149; }
        .blue { color: #58a6ff; }
        .purple { color: #bc8cff; }
        .cyan { color: #39d2c0; }
        
        /* Section */
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 14px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1e2733; }
        
        /* Position cards */
        .pos-card { background: #12171f; border: 1px solid #1e2733; border-left: 4px solid #444; border-radius: 0 8px 8px 0; padding: 14px; margin-bottom: 10px; transition: transform 0.15s; }
        .pos-card:hover { transform: translateX(4px); }
        .pos-card.CC { border-left-color: #39d2c0; }
        .pos-card.CSP { border-left-color: #bc8cff; }
        .pos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pos-ticker { font-size: 16px; font-weight: 700; }
        .pos-premium { font-size: 16px; font-weight: 700; color: #3fb950; }
        .pos-details { display: flex; justify-content: space-between; font-size: 12px; color: #6e7681; margin-bottom: 8px; }
        
        /* Progress bars */
        .progress-row { margin: 8px 0; }
        .progress-label { font-size: 11px; color: #6e7681; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .progress-bg { height: 6px; background: #1e2733; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        
        /* Trade list */
        .trade-item { display: flex; justify-content: space-between; padding: 10px 14px; background: #12171f; border: 1px solid #1e2733; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
        .trade-ticker { font-weight: 700; }
        .trade-profit { color: #3fb950; font-weight: 700; }
        
        /* Week group */
        .week-group { margin-bottom: 16px; }
        .week-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #12171f; border: 1px solid #1e2733; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .week-header:hover { background: #161b22; }
        .week-title { font-size: 14px; font-weight: 700; color: #58a6ff; }
        .week-summary { font-size: 12px; color: #6e7681; }
        .week-total { font-size: 16px; font-weight: 700; color: #3fb950; }
        .week-trades { margin-top: 8px; padding-left: 12px; display: none; }
        .week-trades.expanded { display: block; }
        .week-arrow { transition: transform 0.2s; }
        .week-arrow.expanded { transform: rotate(90deg); }
        .week-badge { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 6px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
        .week-badge.ongoing { background: rgba(188, 140, 255, 0.16); color: #bc8cff; }
        .week-badge.closed { background: rgba(57, 210, 192, 0.16); color: #39d2c0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="lock">
            <h1>🐴 Theta Gang</h1>
            <input type="password" id="pwd" placeholder="密码">

            <div class="error" id="err"></div>
        </div>
        <div id="dashboard">

            <div class="section">
                <h2>每周收益目标</h2>
                <div style="background: #12171f; border: 1px solid #1e2733; border-radius: 12px; padding: 20px;">
                    <canvas id="weekly-chart" height="200"></canvas>
                </div>
            </div>
            <div class="section">
                <h2>Realized 战绩</h2>
                <div id="realized"></div>
            </div>
        </div>
    </div>

        const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
        
        async function unlock() {
            const pwd = document.getElementById('pwd').value;
            try {
                const enc = new TextEncoder();
                const km = await crypto.subtle.importKey('raw', enc.encode(pwd), {name: 'PBKDF2'}, false, ['deriveKey']);
                const key = await crypto.subtle.deriveKey({name: 'PBKDF2', salt: b64(ENC.salt), iterations: 100000, hash: 'SHA-256'}, km, {name: 'AES-GCM', length: 256}, false, ['decrypt']);
                const ct = b64(ENC.data), tag = b64(ENC.tag);
                const combined = new Uint8Array(ct.length + tag.length);
                combined.set(ct); combined.set(tag, ct.length);
                const data = JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name: 'AES-GCM', iv: b64(ENC.iv)}, key, combined)));
                
                document.getElementById('lock').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                renderDashboard(data);
            } catch(e) { 
                document.getElementById('err').textContent = '密码错误'; 
            }
        }
        
        function renderDashboard(data) {
            // Calculate stats
            const allPos = [...data.ccPositions, ...data.cspPositions];
            const totalPremium = allPos.reduce((sum, p) => sum + (p.premium || 0), 0);
            const totalRealized = data.closedTrades.reduce((sum, t) => {
                // 如果有负 profit，说明是亏损交易，用 profit；否则用 premium
                return sum + (t.profit < 0 ? t.profit : t.premium || 0);
            }, 0);
            const avgProfit = allPos.length > 0 ? allPos.reduce((sum, p) => sum + (p.profit || 0), 0) / allPos.length : 0;
            
            // Group trades by week
            const weeklyData = {};
            const toWeekKey = (dateStr) => {
                const date = new Date(dateStr);
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - date.getDay() + 1); // Monday
                return weekStart.toISOString().slice(0, 10);
            };
            const ensureWeek = (weekKey) => {
                if (!weeklyData[weekKey]) weeklyData[weekKey] = { total: 0, count: 0, ongoing: false, ongoingPremium: 0, realized: 0 };
                return weeklyData[weekKey];
            };

            data.closedTrades.forEach(t => {
                if (!t.closeDate) return;
                const weekKey = toWeekKey(t.closeDate);
                const bucket = ensureWeek(weekKey);
                const realized = (t.profit < 0 ? t.profit : t.premium || 0);
                bucket.total += realized;
                bucket.realized += realized;
                bucket.count += 1;
            });

            allPos.forEach(p => {
                if (!p.sellDate) return;
                const weekKey = toWeekKey(p.sellDate);
                const bucket = ensureWeek(weekKey);
                bucket.total += (p.premium || 0);
                bucket.ongoingPremium += (p.premium || 0);
                bucket.count += 1;
                bucket.ongoing = true;
            });
            
            const weeks = Object.keys(weeklyData).sort().reverse().slice(0, 6); // Last 6 weeks incl. ongoing
            const orderedWeeks = weeks.reverse();
            
            // Render weekly chart with Chart.js
            const chartLabels = orderedWeeks.map(w => {
                const monday = new Date(w);
                const friday = new Date(monday);
                friday.setDate(monday.getDate() + 4);
                const fmt = (d) => `${d.getMonth() + 1}.${d.getDate()}`;
                return `${fmt(monday)}-${fmt(friday)}`;
            });
            const chartData = orderedWeeks.map(w => weeklyData[w].total);
            const chartColors = orderedWeeks.map(w => weeklyData[w].ongoing ? 'rgba(188, 140, 255, 0.82)' : 'rgba(57, 210, 192, 0.8)');
            const chartBorders = orderedWeeks.map(w => weeklyData[w].ongoing ? '#bc8cff' : '#39d2c0');
            const target = 1000;
            
            const ctx = document.getElementById('weekly-chart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '周收益',
                        data: chartData,
                        backgroundColor: chartColors,
                        borderColor: chartBorders,
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const week = orderedWeeks[ctx.dataIndex];
                                    const bucket = weeklyData[week];
                                    if (bucket.ongoing) {
                                        return [`进行中合计: $${ctx.parsed.y}`, `已实现: $${bucket.realized}`, `在途权利金: $${bucket.ongoingPremium}`];
                                    }
                                    return `$${ctx.parsed.y}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#1e2733' },
                            ticks: { color: '#6e7681', callback: (v) => '$' + v }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#6e7681' }
                        }
                    }
                },
                plugins: [{
                    id: 'targetLine',
                    afterDatasetsDraw: (chart) => {
                        const ctx = chart.ctx;
                        const yAxis = chart.scales.y;
                        const y = yAxis.getPixelForValue(target);
                        ctx.save();
                        ctx.strokeStyle = '#1e3a5f';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(chart.chartArea.left, y);
                        ctx.lineTo(chart.chartArea.right, y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }]
            });
            
            // Render stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="label">持仓数量</div>
                    <div class="value blue">${allPos.length}</div>
                    <div class="sub">${data.ccPositions.length} CC · ${data.cspPositions.length} CSP</div>
                </div>
                <div class="stat-card">
                    <div class="label">持仓权利金</div>
                    <div class="value cyan">$${totalPremium.toFixed(0)}</div>
                    <div class="sub">平均盈利 ${avgProfit.toFixed(0)}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">已实现收益</div>
                    <div class="value green">$${totalRealized.toFixed(0)}</div>
                    <div class="sub">${data.closedTrades.length} 笔交易</div>
                </div>
            `;
            
            // Render ongoing positions
            const ong = document.getElementById('ongoing');
            ong.innerHTML = '';
            allPos.forEach(p => {
                const profit = p.profit || 0;
                const profitColor = profit >= 80 ? '#3fb950' : (profit >= 50 ? '#58a6ff' : (profit < 0 ? '#f85149' : '#6e7681'));
                const profitWidth = Math.min(Math.max(profit, 0), 100);
                
                // Calculate DTE
                const today = new Date();
                const expiry = new Date(p.expiry);
                const dte = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                const dteColor = dte <= 3 ? '#f85149' : (dte <= 7 ? '#d29922' : '#3fb950');
                // 动态计算最大 DTE（开仓时的 DTE）
                const openDate = new Date(p.sellDate);
                const maxDte = Math.ceil((expiry - openDate) / (1000 * 60 * 60 * 24));
                const dteWidth = Math.min((dte / maxDte) * 100, 100);
                
                // Deep ITM detection (CC with profit < -200%)
                const isDeepITM = p.type === 'CC' && profit < -200;
                const cardBg = isDeepITM ? 'background: rgba(217, 130, 43, 0.15);' : '';
                
                ong.innerHTML += `
                    <div class="pos-card ${p.type}" style="${cardBg}">
                        <div class="pos-header">
                            <span class="pos-ticker">${p.ticker} ${p.type} $${p.strike}</span>
                            <span class="pos-premium">$${p.premium}</span>
                        </div>
                        <div class="pos-details">
                            <span>${p.expiry}</span>
                            <span>${dte} DTE</span>
                        </div>
                        <div class="progress-row">
                            <div class="progress-label">
                                <span>盈利进度</span>
                                <span style="color: ${profitColor}; font-weight: 700;">${profit.toFixed(0)}%</span>
                            </div>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width: ${profitWidth}%; background: ${profitColor};"></div>
                            </div>
                        </div>
                        <div class="progress-row">
                            <div class="progress-label">
                                <span>时间衰减</span>
                                <span style="color: ${dteColor};">${dte}d / ${maxDte}d</span>
                            </div>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width: ${100 - dteWidth}%; background: ${dteColor};"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            // Render realized trades by week
            const real = document.getElementById('realized');
            real.innerHTML = '';
            
            // Group by week
            const tradesByWeek = {};
            data.closedTrades.forEach(t => {
                if (!t.closeDate) return;
                const date = new Date(t.closeDate);
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - date.getDay() + 1);
                const weekKey = weekStart.toISOString().slice(0, 10);
                if (!tradesByWeek[weekKey]) tradesByWeek[weekKey] = [];
                tradesByWeek[weekKey].push(t);
            });
            
            // Sort weeks descending
            const tradeWeeks = Object.keys(tradesByWeek).sort().reverse();
            
            tradeWeeks.forEach((weekKey, idx) => {
                const trades = tradesByWeek[weekKey];
                const bucket = weeklyData[weekKey] || { total: 0, ongoing: false, ongoingPremium: 0 };
                const weekTotal = trades.reduce((sum, t) => sum + (t.profit < 0 ? t.profit : t.premium || 0), 0);
                const monday = new Date(weekKey);
                const friday = new Date(monday);
                friday.setDate(monday.getDate() + 4);
                const fmt = (d) => `${d.getMonth() + 1}.${d.getDate()}`;
                const weekLabel = `${fmt(monday)}-${fmt(friday)}`;
                const weekId = `week-${idx}`;
                const badge = bucket.ongoing ? `<span class="week-badge ongoing">进行中</span>` : `<span class="week-badge closed">已结束</span>`;
                const openTrades = allPos.filter(p => p.sellDate && toWeekKey(p.sellDate) === weekKey);
                
                real.innerHTML += `
                    <div class="week-group">
                        <div class="week-header" onclick="toggleWeek('${weekId}')">
                            <div>
                                <div class="week-title">
                                    <span class="week-arrow" id="${weekId}-arrow">▶</span>
                                    ${weekLabel}${badge}
                                </div>
                                <div class="week-summary">${trades.length} 笔已结束${bucket.ongoing ? ` · ${openTrades.length} 笔进行中` : ''}</div>
                            </div>
                            <div class="week-total">${weekTotal >= 0 ? '+' : ''}$${weekTotal.toFixed(0)}</div>
                        </div>
                        <div class="week-trades" id="${weekId}">
                            ${bucket.ongoing ? `
                                <div class="trade-item" style="border-color: #5b3a88; background: rgba(188, 140, 255, 0.08);">
                                    <div>
                                        <span class="trade-ticker" style="color: #bc8cff;">进行中权利金</span>
                                        <div style="font-size: 11px; color: #6e7681; margin-top: 2px;">本周已开未平仓位</div>
                                    </div>
                                    <span class="trade-profit" style="color: #bc8cff;">+$${bucket.ongoingPremium.toFixed(0)}</span>
                                </div>
                            ` : ''}
                            ${openTrades.map(t => `
                                <div class="trade-item" style="border-color: #5b3a88; background: rgba(188, 140, 255, 0.05);">
                                    <div>
                                        <span class="trade-ticker">${t.ticker} ${t.type || ''} $${t.strike}</span>
                                        <div style="font-size: 11px; color: #6e7681; margin-top: 2px;">${(t.sellDate || '').slice(5)} → 持仓中</div>
                                    </div>
                                    <span class="trade-profit" style="color: #bc8cff;">+$${t.premium || 0}</span>
                                </div>
                            `).join('')}
                            ${trades.map(t => {
                                const actualProfit = t.profit < 0 ? t.profit : t.premium;
                                const profitColor = actualProfit < 0 ? '#f85149' : '#3fb950';
                                const profitSign = actualProfit < 0 ? '' : '+';
                                const profitBadge = t.profit && t.profit > 0 ? `<span style="font-size: 10px; background: rgba(63,185,80,0.15); color: #3fb950; padding: 2px 6px; border-radius: 4px; margin-left: 6px;">${t.profit}%</span>` : '';
                                const dateRange = t.openDate && t.closeDate ? `${t.openDate.slice(5)} → ${t.closeDate.slice(5)}` : (t.closeDate || '');
                                return `
                                    <div class="trade-item">
                                        <div>
                                            <span class="trade-ticker">${t.ticker} ${t.type || ''} $${t.strike}</span>${profitBadge}
                                            <div style="font-size: 11px; color: #6e7681; margin-top: 2px;">${dateRange}</div>
                                        </div>
                                        <span class="trade-profit" style="color: ${profitColor};">${profitSign}$${actualProfit}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
        }
        
        function toggleWeek(weekId) {
            const trades = document.getElementById(weekId);
            const arrow = document.getElementById(weekId + '-arrow');
            trades.classList.toggle('expanded');
            arrow.classList.toggle('expanded');
        }
        
        document.getElementById('pwd').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
